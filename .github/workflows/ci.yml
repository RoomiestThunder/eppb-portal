name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Prisma migrate + generate (SQLite, ephemeral)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./ci.db

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./ci.db

  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t eppb-portal:ci .
